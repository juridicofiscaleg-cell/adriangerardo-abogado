<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>adriangerardo.abogado — Lic. Adrián Gerardo</title>
    <meta name="description" content="Lic. Adrián Gerardo, abogado. Consultas legales, asesoría jurídica y contacto directo. Agenda tu cita o escríbeme por WhatsApp.">
    <link rel="icon" href="images/foto.jpg">
    <link rel="apple-touch-icon" href="images/foto.jpg">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="adriangerardo.abogado">
    <meta property="og:title" content="adriangerardo.abogado — Lic. Adrián Gerardo">
    <meta property="og:description" content="Consultas legales, asesoría jurídica y contacto directo.">
    <meta property="og:image" content="images/foto.jpg">
    <meta property="og:locale" content="es_MX">
    <meta name="twitter:card" content="summary">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #0f172a;
            line-height: 1.6;
            overflow-x: hidden;
        }

        main {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 20px 24px;
        }

        .hero {
            text-align: center;
            padding: 8px 0 20px;
        }

        .hero-photo {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e2e8f0;
            margin: 0 auto 14px;
            display: block;
        }

        .hero-photo.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e40af, #0891b2);
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .hero-name {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .hero-sub {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .hero-cedula {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .hero-divider {
            width: 36px;
            height: 3px;
            background: linear-gradient(90deg, #1e40af, #0891b2);
            border-radius: 2px;
            margin: 0 auto;
        }

        .section {
            margin-bottom: 18px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 800;
            color: #0e7490;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: white;
            border: 1.5px solid #cbd5e1;
            border-radius: 14px;
            text-decoration: none;
            color: #0f172a;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
            transition: all 0.15s;
        }

        .link-card:active {
            transform: scale(0.98);
            background: #f8f9fa;
            border-color: #94a3b8;
        }

        @media (min-width: 900px) {
            .link-card:hover {
                border-color: #94a3b8;
                box-shadow: 0 4px 14px rgba(15, 23, 42, 0.1);
                transform: translateY(-1px);
            }
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .card-body { flex: 1; min-width: 0; }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
        }

        .card-sub {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .card-arrow {
            color: #d1d5db;
            font-size: 16px;
            flex-shrink: 0;
        }

        .link-card.whatsapp {
            background: rgba(37, 211, 102, 0.07);
            border-color: rgba(37, 211, 102, 0.28);
        }

        .link-card.whatsapp .card-icon {
            background: rgba(37, 211, 102, 0.12);
            border: 1px solid rgba(37, 211, 102, 0.2);
        }

        .link-card.whatsapp .card-arrow { color: #86efac; }

        @media (min-width: 900px) {
            .link-card.whatsapp:hover {
                background: rgba(37, 211, 102, 0.11);
                border-color: rgba(37, 211, 102, 0.4);
                box-shadow: 0 4px 14px rgba(37, 211, 102, 0.12);
                transform: translateY(-1px);
            }
        }

        .link-card.instagram {
            background: linear-gradient(135deg, rgba(131, 58, 180, 0.06), rgba(253, 29, 29, 0.04), rgba(252, 176, 69, 0.06));
            border-color: rgba(131, 58, 180, 0.2);
        }

        .link-card.instagram .card-icon {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
            font-size: 18px;
        }

        .link-card.instagram .card-arrow { color: #c084fc; }

        @media (min-width: 900px) {
            .link-card.instagram:hover {
                border-color: rgba(131, 58, 180, 0.35);
                box-shadow: 0 4px 14px rgba(131, 58, 180, 0.1);
                transform: translateY(-1px);
            }
        }

        footer {
            text-align: center;
            padding: 24px 20px 32px;
            font-size: 11px;
            color: #94a3b8;
        }

        footer a {
            color: #64748b;
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main id="app"></main>
    <footer id="footer"></footer>

    <script>
        // ═══════════════════════════════════════════════
        //  EDITA AQUÍ — Personaliza tu página
        // ═══════════════════════════════════════════════
        const CONFIG = {
            brand: "adriangerardo.abogado",
            fullName: "Lic. Adrián Gerardo",
            cedula: "",
            initials: "AG",
            photo: "images/foto.jpg",

            links: {
                calendar: {
                    url: "https://calendar.app.google/Jcr551tUoW1QM57PA",
                    title: "Agenda una consulta",
                    subtitle: "Elige día y hora disponible"
                },
                whatsapp: {
                    url: "https://wa.me/526623046770?text=Hola%2C%20me%20interesa%20agendar%20una%20consulta%20legal",
                    title: "Escríbeme por WhatsApp",
                    subtitle: "Respuesta en horario laboral"
                },
                instagram: {
                    url: "https://instagram.com/adriangerardo.abogado",
                    title: "Sígueme en Instagram",
                    subtitle: "@adriangerardo.abogado"
                }
            },

            footer: {
                year: new Date().getFullYear(),
                privacyUrl: ""  // ej: "/aviso-privacidad.html" — deja "" para ocultar
            }
        };
        // ═══════════════════════════════════════════════

        const app = document.getElementById("app");

        const photoHtml = CONFIG.photo
            ? `<img class="hero-photo" src="${CONFIG.photo}" alt="${CONFIG.fullName}">`
            : `<div class="hero-photo placeholder" aria-hidden="true">${CONFIG.initials}</div>`;

        const cedulaHtml = CONFIG.cedula
            ? `<p class="hero-cedula">${CONFIG.cedula}</p>`
            : "";

        app.innerHTML = `
            <section class="hero">
                ${photoHtml}
                <h1 class="hero-name">${CONFIG.brand}</h1>
                <p class="hero-sub">${CONFIG.fullName}</p>
                ${cedulaHtml}
                <div class="hero-divider"></div>
            </section>

            <section class="section">
                <p class="section-label">Consultas</p>
                <a class="link-card" href="${CONFIG.links.calendar.url}" target="_blank" rel="noopener">
                    <div class="card-icon">📅</div>
                    <div class="card-body">
                        <div class="card-title">${CONFIG.links.calendar.title}</div>
                        <div class="card-sub">${CONFIG.links.calendar.subtitle}</div>
                    </div>
                    <span class="card-arrow">→</span>
                </a>
            </section>

            <section class="section">
                <p class="section-label">Contacto</p>
                <a class="link-card whatsapp" href="${CONFIG.links.whatsapp.url}" target="_blank" rel="noopener">
                    <div class="card-icon">💬</div>
                    <div class="card-body">
                        <div class="card-title">${CONFIG.links.whatsapp.title}</div>
                        <div class="card-sub">${CONFIG.links.whatsapp.subtitle}</div>
                    </div>
                    <span class="card-arrow">→</span>
                </a>
            </section>

            <section class="section">
                <p class="section-label">Redes</p>
                <a class="link-card instagram" href="${CONFIG.links.instagram.url}" target="_blank" rel="noopener">
                    <div class="card-icon">📷</div>
                    <div class="card-body">
                        <div class="card-title">${CONFIG.links.instagram.title}</div>
                        <div class="card-sub">${CONFIG.links.instagram.subtitle}</div>
                    </div>
                    <span class="card-arrow">→</span>
                </a>
            </section>
        `;

        document.title = `${CONFIG.brand} — ${CONFIG.fullName}`;

        const footer = document.getElementById("footer");
        const privacyLink = CONFIG.footer.privacyUrl
            ? `<br><a href="${CONFIG.footer.privacyUrl}">Aviso de Privacidad</a>`
            : "";

        footer.innerHTML = `© ${CONFIG.footer.year} ${CONFIG.brand} · ${CONFIG.fullName}${privacyLink}`;
    </script>
</body>
</html>
